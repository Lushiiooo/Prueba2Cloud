version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: medical_db
    environment:
      POSTGRES_DB: medical_reserva
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_secure_pwd_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_reserva"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medical_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: medical_web
    command: gunicorn medicalreserva.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "${DEBUG}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_HOST: "${DB_HOST}"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "django-insecure-dev-key-only-for-local-development"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: medical_celery
    command: celery -A medicalreserva worker -l info
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      DB_NAME: "medical_reserva"
      DB_USER: "medical_user"
      DB_PASSWORD: "medical_secure_pwd_2024"
      DB_HOST: "db"
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "django-insecure-dev-key-only-for-local-development"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
