name: Deploy Django to AWS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Ejecutar despliegue vía SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Navega a la carpeta de tu proyecto en la instancia EC2
          # Reemplaza "PRUEBA2_CLOUD" si la carpeta en tu servidor se llama distinto
          cd ~/PRUEBA2_CLOUD
          
          # 2. Trae los últimos cambios limpios de GitHub
          git fetch --all
          git reset --hard origin/main
          
          # 3. Reconstruye las imágenes y levanta los contenedores en segundo plano
          docker-compose up -d --build
          
          # 4. Limpia imágenes viejas para no llenar el disco del servidor
          docker image prune -f