name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Se ejecuta solo cuando haces push a la rama main

jobs:
  # ==========================================
  # FASE 1: Integración Continua (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Ajusta a tu versión de Python

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar pruebas de Django
      run: |
        # Ejecuta los tests configurados en tu proyecto
        python manage.py test

  # ==========================================
  # FASE 2: Despliegue Continuo (CD)
  # ==========================================
  deploy:
    needs: build-and-test # Solo se ejecuta si la fase 1 pasa sin errores
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Desplegar en servidor remoto
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Navegar a la carpeta del proyecto
          cd /ruta/absoluta/a/tu/proyecto
          
          # 2. Traer los últimos cambios de GitHub
          git pull origin main
          
          # 3. Activar entorno virtual e instalar nuevas dependencias
          source venv/bin/activate
          pip install -r requirements.txt
          
          # 4. Aplicar migraciones y recolectar estáticos
          python manage.py migrate
          python manage.py collectstatic --noinput
          
          # 5. Reiniciar los servicios (Gunicorn, Celery, etc.)
          sudo systemctl restart gunicorn
          sudo systemctl restart celery