name: CI/CD Pipeline - Medical Reserva

on:
  push:
    branches: [ "main" ]

jobs:
  # --- ETAPA 1: INTEGRACIÓN CONTINUA (CI) ---
  run-tests:
    runs-on: ubuntu-latest

    services:
      # Levantamos un servicio temporal de Redis en el runner de GitHub porque Django lo necesita para Celery
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Pruebas Unitarias (Validación de Código)
      env:
        # Inyectamos variables de entorno temporales para que Django pueda inicializarse en el entorno de pruebas
        SECRET_KEY: "clave-secreta-temporal-de-entorno-de-pruebas"
        DEBUG: "True"
        DB_NAME: "test_db"
        DB_USER: "postgres"
        DB_PASSWORD: "password"
        DB_HOST: "localhost"
        REDIS_URL: "redis://localhost:6379/0"
      run: |
        python manage.py test

  # --- ETAPA 2: DESPLIEGUE CONTINUO (CD) ---
  deploy:
    runs-on: ubuntu-latest
    needs: run-tests # <--- CRUCIAL: Bloquea el despliegue si el job "run-tests" falla.

    steps:
    - name: Ejecutar despliegue vía SSH en AWS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/Prueba2Cloud
          git fetch --all
          git reset --hard origin/main
          docker-compose up -d --build
          docker image prune -f