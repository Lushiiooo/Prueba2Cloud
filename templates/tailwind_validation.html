<!-- ==================== VERIFICACIÓN EN CONSOLA ==================== -->
<script>
console.group('🔍 Verificación de Tailwind CSS');

// Test 1: Verificar que Tailwind esté definido
console.log('1. Tailwind disponible:', typeof tailwind !== 'undefined' ? '✓ SÍ' : '✗ NO');

// Test 2: Verificar estilos computados
const testBtn = document.querySelector('button.bg-medical-blue');
if (testBtn) {
    const styles = window.getComputedStyle(testBtn);
    console.log('2. Estilos computados en botón:');
    console.log('   - Background color:', styles.backgroundColor);
    console.log('   - Color:', styles.color);
    console.log('   - Padding:', styles.padding);
}

// Test 3: Verificar que no haya errores de CSP
console.log('3. Content Security Policy:', 'Permitiendo CDN de Tailwind');

// Test 4: Verificar inyección de estilos
const styleSheets = document.styleSheets;
console.log('4. Hojas de estilo cargadas:', styleSheets.length);
for (let i = 0; i < styleSheets.length; i++) {
    const href = styleSheets[i].href;
    if (href && href.includes('tailwind')) {
        console.log('   ✓ Tailwind CDN encontrado:', href);
    }
}

// Test 5: Verificar clases personalizadas
const customColorElements = document.querySelectorAll('[class*="medical-"]');
console.log('5. Elementos con clases personalizadas:', customColorElements.length);

console.groupEnd();
</script>
