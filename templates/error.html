{% extends 'base.html' %}

{% block title %}Error - Medical Reserva{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="text-center max-w-md">
        <div class="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-6 text-red-500 text-5xl">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h1 class="text-4xl font-bold text-medical-dark mb-4">¡Oops! Error</h1>
        
        {% if mensaje %}
        <p class="text-lg text-gray-600 mb-8">{{ mensaje }}</p>
        {% else %}
        <p class="text-lg text-gray-600 mb-8">
            Lo sentimos, algo salió mal. Por favor, intenta de nuevo más tarde.
        </p>
        {% endif %}
        
        <div class="space-y-3">
            <a href="{% url 'index' %}" class="block btn-primary text-white font-semibold px-8 py-3 rounded-lg transition hover:shadow-lg">
                <i class="fas fa-home mr-2"></i>Volver al Inicio
            </a>
            <a href="{% url 'dashboard_paciente' %}" class="block border-2 border-medical-blue text-medical-blue font-semibold px-8 py-3 rounded-lg hover:bg-medical-light-blue transition">
                <i class="fas fa-arrow-left mr-2"></i>Mi Dashboard
            </a>
        </div>
    </div>
</section>
{% endblock %}
